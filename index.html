<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Finding Interest</title>
    <link rel="stylesheet" href="find_interest.css">
  </head>
  <body>
    <div class="container">
      <h1 style="text-align: center;">Interest Calculator</h1>
      <label for="am">Principal Amount:</label>
      <input type="number" name="Amount" id="am" placeholder="Enter Amount">
      <label for="in">Interest:</label>
      <input type="number" name="Interest" id="in" placeholder="Enter Interest (₹ Per ₹100 per month)">
      <label for="tm">Time:</label>
      <input type="number" name="Time" id="tm" placeholder="Enter Time (in months)">
      <button id="btn">Calculate</button>
      <h2>Result will appear here</h2>
    </div>
   <script src="find_interest.js" ></script>
  </body>
</html>
